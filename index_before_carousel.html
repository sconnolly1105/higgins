  /******************************************************************
   * RENDERER: builds <ul>/<li> from JSON
   * Bio text is stored as a data-bio attribute on each <li>.
   * jsTree preserves data attributes, so we can retrieve them
   * reliably in the activate_node event handler.
   ******************************************************************/
  function buildLiFromNode(node) {
    const li = document.createElement("li");

    if (node.opened === true) {
      li.setAttribute("data-jstree", JSON.stringify({ opened: true }));
    }

    if (node.bio) {
      li.setAttribute("data-bio", node.bio);
    }

    li.appendChild(document.createTextNode(node.label));

    if (Array.isArray(node.children) && node.children.length) {
      const ul = document.createElement("ul");
      node.children.forEach(child => ul.appendChild(buildLiFromNode(child)));
      li.appendChild(ul);
    }
    return li;
  }

  function renderFamilyTree(rootData, targetUlId) {
    const ul = document.getElementById(targetUlId);
    if (!ul) return;
    ul.innerHTML = "";
    ul.appendChild(buildLiFromNode(rootData));
  }

  /******************************************************************
   * BIO DISPLAY
   ******************************************************************/
  function showBio(bioText) {
    let html = bioText || "No information on this individual.";
    html = html.replace(/#b#/gi,  "<b>");
    html = html.replace(/#!b#/gi, "</b>");
    html = html.replace(/#u#/gi,  "<u>");
    html = html.replace(/#!u#/gi, "</u>");
    html = html.replace(/\n/g,    "<br>");
    document.getElementById("inner").innerHTML = html;
    document.getElementById("outer").style.display = "block";
    return false;
  }

  function closeDiv() {
    document.getElementById("outer").style.display = "none";
    return false;
  }

  document.addEventListener("DOMContentLoaded", function () {

    renderFamilyTree(familyTreeData, "org");

    $("#data").jstree({ "plugins": ["state"] });

    // activate_node fires when a node label is clicked.
    // data.node.id is the id jsTree assigned to the <li>,
    // so we retrieve the original element and read data-bio from it.
    $("#data").on("activate_node.jstree", function (e, data) {
      const li = document.getElementById(data.node.id);
      const bio = li ? li.getAttribute("data-bio") : null;
      showBio(bio);
    });

  });

  </script>
</body>
</html>
